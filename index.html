<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>RunFlow</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  background: #0b1220;
  font-family: system-ui;
  color: white;
  overflow: hidden;
}

/* HEADER */
.header {
  position: absolute;
  top: 20px;
  left: 20px;
  right: 20px;
  display: flex;
  justify-content: space-between;
  font-size: 12px;
}

.btn {
  padding: 6px 10px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.2);
  cursor: pointer;
  background: transparent;
  color: white;
}

.install-btn {
  background: #4ade80;
  color: #0b1220;
  border: none;
  font-weight: bold;
  padding: 10px 20px;
  border-radius: 8px;
  margin-bottom: 15px;
  cursor: pointer;
  display: none;
}

/* SCREENS */
.screen {
  display: none;
  height: 100vh;
  width: 100%;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.active { display: flex; }

.bigbtn {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  border: none;
  font-size: 20px;
  font-weight: bold;
  background: white;
  color: black;
  cursor: pointer;
}

.timer {
  margin-top: 15px;
  font-size: 28px;
}

.list {
  width: 80%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-height: 70vh;
  overflow-y: auto;
}

.item {
  padding: 12px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  cursor: pointer;
  display: flex;
  justify-content: space-between;
}

.wrap {
  width: 360px;
  height: 360px;
}

svg { width: 100%; height: 100%; }

.line {
  fill: none;
  stroke: white;
  stroke-width: 2;
  opacity: 0.6;
}

.dot {
  fill: white;
  cursor: pointer;
  transition: r 0.2s, fill 0.2s;
}

.dot:hover {
  fill: #4ade80;
  r: 4;
}

.info {
  position: absolute;
  bottom: 30px;
  width: 90%;
  text-align: center;
  font-size: 14px;
  background: rgba(0,0,0,0.5);
  padding: 10px;
  border-radius: 8px;
  min-height: 20px;
}

.popup {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
}

.box {
  background: #111a2e;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
}

.box button {
  margin: 15px 5px 0 5px;
  padding: 8px 20px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: white;
  color: black;
}

/* WAKE LOCK STATUS INDICATOR */
#wakeLockStatus {
  position: absolute;
  bottom: 10px;
  font-size: 10px;
  opacity: 0.5;
}
</style>
</head>

<body>

<div class="header">
  <div id="leftBtn" class="btn" onclick="nav('routes')">Routes</div>
  <div id="title">RunFlow</div>
</div>

<div id="run" class="screen active">
  <button class="bigbtn" onclick="toggleRun()" id="btn">START</button>
  <div class="timer" id="timer">00:00</div>
  <div id="wakeLockStatus"></div>
</div>

<div id="routes" class="screen">
  <button id="installBtn" class="install-btn" onclick="installPWA()">App Installeren</button>
  <div class="list" id="list"></div>
</div>

<div id="view" class="screen">
  <div class="wrap">
    <svg id="svg" viewBox="0 0 100 100"></svg>
  </div>
  <div class="info" id="info">Klik op een stip voor info</div>
</div>

<div id="popup" class="popup">
  <div class="box">
    <div>Stop run?</div>
    <button onclick="confirmStop(true)">Ja</button>
    <button onclick="confirmStop(false)">Nee</button>
  </div>
</div>

<script>
let state = "run";
let running = false;
let startTime;
let interval;
let tempRun;
let watchId;
let deferredPrompt; 
let wakeLock = null; // Variabele voor de schermbeveiliging

/* WAKE LOCK LOGICA (SCHERM AAN HOUDEN) */
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      document.getElementById('wakeLockStatus').innerText = "Scherm wordt actief gehouden";
      
      // Als de lock onverwacht stopt (bijv. door batterijbesparing)
      wakeLock.addEventListener('release', () => {
        document.getElementById('wakeLockStatus').innerText = "";
      });
    }
  } catch (err) {
    console.error(`Wake Lock fout: ${err.name}, ${err.message}`);
  }
}

function releaseWakeLock() {
  if (wakeLock !== null) {
    wakeLock.release().then(() => {
      wakeLock = null;
      document.getElementById('wakeLockStatus').innerText = "";
    });
  }
}

// Zorg dat het scherm weer aan blijft als je terugwisselt vanuit een andere app
document.addEventListener('visibilitychange', async () => {
  if (wakeLock !== null && document.visibilityState === 'visible' && running) {
    await requestWakeLock();
  }
});

/* PWA INSTALLATIE LOGICA */
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').style.display = 'block';
});

function installPWA() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then((choiceResult) => {
      deferredPrompt = null;
      document.getElementById('installBtn').style.display = 'none';
    });
  }
}

/* NAVIGATIE & HEADER */
function nav(s){
  state = s;
  document.querySelectorAll(".screen").forEach(x => x.classList.remove("active"));
  document.getElementById(s).classList.add("active");
  updateHeader();
  
  if(s !== "view") {
    document.getElementById("info").innerText = "Klik op een stip voor info";
  }
}

function updateHeader(){
  const left = document.getElementById("leftBtn");
  const title = document.getElementById("title");

  if(state === "run"){
    left.innerText = "Routes";
    left.onclick = () => nav("routes");
    title.innerText = "RunFlow";
  }

  if(state === "routes"){
    left.innerText = "← Start";
    left.onclick = () => nav("run");
    title.innerText = "Routes";
    loadRuns();
  }

  if(state === "view"){
    left.innerText = "← Terug";
    left.onclick = () => nav("routes");
    title.innerText = "Route details";
  }
}

/* AFSTANDSBEREKENING (Haversine) */
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const rad = Math.PI / 180;
  const dLat = (lat2 - lat1) * rad;
  const dLon = (lon2 - lon1) * rad;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * rad) * Math.cos(lat2 * rad) *
            Math.sin(dLon/2) * Math.sin(dLon/2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c; 
}

/* RUN LOGICA */
function toggleRun(){
  if(!running) startRun();
  else document.getElementById("popup").style.display="flex";
}

function startRun(){
  running = true;
  document.getElementById("btn").innerText = "STOP";
  startTime = Date.now();
  tempRun = { start: startTime, points: [] };

  // Zet scherm lock aan
  requestWakeLock();

  interval = setInterval(() => {
    let s = Math.floor((Date.now() - startTime) / 1000);
    let m = Math.floor(s / 60);
    s %= 60;
    document.getElementById("timer").innerText = String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
  }, 1000);

  if ("geolocation" in navigator) {
    watchId = navigator.geolocation.watchPosition(
      (position) => {
        let lat = position.coords.latitude;
        let lon = position.coords.longitude;
        let t = Date.now() - startTime;
        let len = tempRun.points.length;

        if (len === 0) {
          tempRun.points.push({ lat, lon, t });
        } else {
          let lastP = tempRun.points[len - 1];
          let distance = getDistance(lastP.lat, lastP.lon, lat, lon);
          
          if (distance > 5) { // Alleen opslaan als we meer dan 5 meter zijn verplaatst
            tempRun.points.push({ lat, lon, t });
          }
        }
      },
      (error) => {
        console.warn('GPS Error: ', error.message);
      },
      { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
    );
  } else {
    alert("GPS wordt niet ondersteund door je browser.");
  }
}

function confirmStop(ok){
  document.getElementById("popup").style.display = "none";
  if(!ok) return;
  stopRun();
}

function stopRun(){
  running = false;
  document.getElementById("btn").innerText = "START";

  clearInterval(interval);
  if (watchId) navigator.geolocation.clearWatch(watchId);
  
  // Zet scherm lock uit
  releaseWakeLock();

  let runs = JSON.parse(localStorage.getItem("runs") || "[]");
  tempRun.end = Date.now();
  
  if(tempRun.points.length > 0) {
      runs.unshift(tempRun);
      localStorage.setItem("runs", JSON.stringify(runs));
  }

  document.getElementById("timer").innerText = "00:00";
  
  if(tempRun.points.length > 0) showRun(tempRun);
  else nav("routes");
}

/* LIJST MET ROUTES */
function loadRuns(){
  let runs = JSON.parse(localStorage.getItem("runs") || "[]");
  const list = document.getElementById("list");
  list.innerHTML = "";

  if(runs.length === 0) {
      list.innerHTML = "<div style='text-align:center; opacity:0.5;'>Nog geen routes.</div>";
  }

  runs.forEach((r, i) => {
    let div = document.createElement("div");
    div.className = "item";
    let t = ((r.end - r.start) / 1000).toFixed(0);
    let dist = 0;
    for(let j=1; j<r.points.length; j++){
       dist += getDistance(r.points[j-1].lat, r.points[j-1].lon, r.points[j].lat, r.points[j].lon);
    }
    div.innerHTML = `Run ${runs.length - i} <span>${dist.toFixed(0)}m / ${t}s</span>`;
    div.onclick = () => showRun(r);
    list.appendChild(div);
  });
}

/* KAART WEERGAVE */
function showRun(run){
  nav("view");
  const svg = document.getElementById("svg");
  const info = document.getElementById("info");
  svg.innerHTML = "";
  info.innerText = "Klik op een stip voor info";

  let pts = run.points;
  if(!pts || pts.length === 0) return;

  let lons = pts.map(p => p.lon);
  let lats = pts.map(p => p.lat);

  let minLon = Math.min(...lons), maxLon = Math.max(...lons);
  let minLat = Math.min(...lats), maxLat = Math.max(...lats);

  const pad = 10;
  const mapX = lon => ((lon - minLon) / (maxLon - minLon || 1)) * (100 - pad * 2) + pad;
  const mapY = lat => ((maxLat - lat) / (maxLat - minLat || 1)) * (100 - pad * 2) + pad;

  let path = "";
  pts.forEach((p, i) => {
    path += (i === 0 ? "M" : "L") + mapX(p.lon) + " " + mapY(p.lat) + " ";
  });

  let line = document.createElementNS("http://www.w3.org/2000/svg", "path");
  line.setAttribute("d", path);
  line.setAttribute("class", "line");
  svg.appendChild(line);

  pts.forEach(p => {
    let c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    c.setAttribute("cx", mapX(p.lon));
    c.setAttribute("cy", mapY(p.lat));
    c.setAttribute("r", 2);
    c.setAttribute("class", "dot");
    
    c.onclick = () => {
        let sec = (p.t / 1000).toFixed(1);
        info.innerHTML = `Tijd: <b>${sec}s</b><br>Lat: ${p.lat.toFixed(5)}, Lon: ${p.lon.toFixed(5)}`;
    };
    
    svg.appendChild(c);
  });

  let t = ((run.end - run.start) / 1000).toFixed(0);
  document.getElementById("title").innerText = `${t}s geselecteerd`;
}

/* INIT & SERVICE WORKER REGISTRATIE */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .catch(err => console.error('Service Worker mislukt: ', err));
  });
}

updateHeader();
loadRuns();
</script>

</body>
</html>
