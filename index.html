<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>RunFlow</title>
<style>
body { margin: 0; background: #0b1220; font-family: system-ui; color: white; overflow: hidden; }
.header { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: flex-start; }
.btn { padding: 10px 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; background: transparent; color: white; }
.screen { display: none; height: 100vh; width: 100%; align-items: center; justify-content: center; flex-direction: column; }
.active { display: flex; }
.bigbtn { width: 180px; height: 180px; border-radius: 50%; border: none; font-size: 20px; font-weight: bold; background: white; color: black; cursor: pointer; }
.timer { margin-top: 15px; font-size: 28px; }
.list { width: 80%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; max-height: 70vh; overflow-y: auto; margin-top: 60px; }
.item { padding: 15px; border-radius: 10px; background: rgba(255,255,255,0.05); cursor: pointer; }
.wrap { width: 360px; height: 360px; margin-top: 20px; position: relative; }
svg { width: 100%; height: 100%; }
.line { fill: none; stroke: white; stroke-width: 2; opacity: 0.5; }
.line-green { fill: none; stroke: #4ade80; stroke-width: 4; }
.dot { fill: white; cursor: pointer; }
.dot-selected { fill: #4ade80; r: 5; }
.info { position: absolute; bottom: 30px; width: 80%; text-align: left; font-size: 13px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 1px solid #444; z-index: 10; }
</style>
</head>
<body>

<div class="header">
  <div id="navBtn" class="btn" onclick="nav('routes')">Routes</div>
</div>

<div id="run" class="screen active">
  <button class="bigbtn" onclick="toggleRun()" id="btn">START</button>
  <div class="timer" id="timer">00:00</div>
</div>

<div id="routes" class="screen">
  <div class="list" id="list"></div>
</div>

<div id="view" class="screen">
  <div class="wrap"><svg id="svg" viewBox="0 0 100 100"></svg></div>
  <div class="info" id="info">Klik op een punt</div>
</div>

<script>
let running=false, startTime, interval, tempRun, watchId, selectedPoints=[];

function nav(s){
  document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));
  document.getElementById(s).classList.add("active");
  document.getElementById("navBtn").innerText = (s==="run" ? "Routes" : "Start");
  document.getElementById("navBtn").onclick = () => nav(s==="run" ? "routes" : "run");
}

function getDistance(p1, p2) {
  const R = 6371e3;
  const dLat = (p2.lat-p1.lat)*Math.PI/180, dLon = (p2.lon-p1.lon)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(p1.lat*Math.PI/180)*Math.cos(p2.lat*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function startRun(){
  running=true;
  document.getElementById("btn").innerText="STOP";
  startTime=Date.now();
  tempRun={start:startTime, points:[]};
  interval=setInterval(()=>{
    let s=Math.floor((Date.now()-startTime)/1000);
    let m=Math.floor(s/60); s%=60;
    document.getElementById("timer").innerText = String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
  },1000);
  watchId=navigator.geolocation.watchPosition(p=>{
    tempRun.points.push({lat:p.coords.latitude, lon:p.coords.longitude, t:Date.now()-startTime});
  },null,{enableHighAccuracy:true});
}

function toggleRun(){
  if(!running) startRun();
  else {
    running=false;
    clearInterval(interval);
    navigator.geolocation.clearWatch(watchId);
    tempRun.end=Date.now();
    let runs=JSON.parse(localStorage.getItem("runs")||"[]");
    runs.unshift(tempRun);
    localStorage.setItem("runs", JSON.stringify(runs));
    document.getElementById("btn").innerText="START";
    document.getElementById("timer").innerText="00:00";
    nav("routes");
  }
}

function loadRuns(){
  let runs=JSON.parse(localStorage.getItem("runs")||"[]");
  const list=document.getElementById("list");
  list.innerHTML="";
  runs.forEach((r,i)=>{
    let div=document.createElement("div");
    div.className="item";
    div.innerText=`Run ${runs.length-i}`;
    div.onclick=()=>showRun(r);
    div.oncontextmenu=(e)=>{
      e.preventDefault();
      if(confirm("Verwijderen?")){ runs.splice(i,1); localStorage.setItem("runs", JSON.stringify(runs)); loadRuns(); }
    };
    list.appendChild(div);
  });
}

function showRun(run){
  nav("view");
  const svg=document.getElementById("svg");
  svg.innerHTML="";
  selectedPoints=[];
  let lons=run.points.map(p=>p.lon), lats=run.points.map(p=>p.lat);
  let minLon=Math.min(...lons), maxLon=Math.max(...lons), minLat=Math.min(...lats), maxLat=Math.max(...lats);
  const mapX=l=>((l-minLon)/(maxLon-minLon||1))*80+10;
  const mapY=l=>((maxLat-l)/(maxLat-minLat||1))*80+10;

  let path="M ";
  run.points.forEach((p,i)=>{
    path += (i===0?"":"L ") + mapX(p.lon) + " " + mapY(p.lat) + " ";
  });

  let lineEl=document.createElementNS("http://www.w3.org/2000/svg","path");
  lineEl.setAttribute("d",path); lineEl.setAttribute("class","line");
  svg.appendChild(lineEl);

  run.points.forEach((p,i)=>{
    let c=document.createElementNS("http://www.w3.org/2000/svg","circle");
    c.setAttribute("cx",mapX(p.lon)); c.setAttribute("cy",mapY(p.lat)); c.setAttribute("r",2); c.setAttribute("class","dot");
    c.onclick=()=>{
      if(selectedPoints.length>=2) { 
          selectedPoints=[]; 
          document.querySelectorAll('.dot-selected').forEach(d=>d.classList.remove('dot-selected'));
          let greens = svg.querySelectorAll('.line-green');
          greens.forEach(g => g.remove());
      }
      selectedPoints.push(p);
      c.classList.add("dot-selected");
      
      let info=document.getElementById("info");
      info.innerHTML=`Tijd: ${Math.floor(p.t/1000)}s<br><a href="https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lon}" target="_blank" style="color:#4ade80;">Bekijk op Maps</a>`;
      
      if(selectedPoints.length===2){
        let d=getDistance(selectedPoints[0], selectedPoints[1]);
        let dt=Math.abs(selectedPoints[1].t-selectedPoints[0].t)/1000;
        info.innerHTML+=`<br>Afstand: ${d.toFixed(0)}m, Tijd: ${dt.toFixed(0)}s`;
        
        // Teken groene lijn
        let gLine=document.createElementNS("http://www.w3.org/2000/svg","line");
        gLine.setAttribute("x1", mapX(selectedPoints[0].lon)); gLine.setAttribute("y1", mapY(selectedPoints[0].lat));
        gLine.setAttribute("x2", mapX(selectedPoints[1].lon)); gLine.setAttribute("y2", mapY(selectedPoints[1].lat));
        gLine.setAttribute("class","line-green");
        svg.appendChild(gLine);
      }
    };
    svg.appendChild(c);
  });
}

loadRuns();
</script>
</body>
</html>
