<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>RunFlow</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
body { margin: 0; background: #0b1220; font-family: system-ui; color: white; overflow: hidden; }
.header { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: bold; z-index: 500; }
.actions { display: flex; gap: 8px; }
.btn { padding: 6px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; background: rgba(0,0,0,0.5); }
.btn.on { background: #4ade80; color: #000; border-color: #4ade80; }
.screen { display: none; height: 100vh; width: 100%; align-items: center; justify-content: center; flex-direction: column; box-sizing: border-box; position: relative; }
.active { display: flex; }
.bigbtn { width: 180px; height: 180px; border-radius: 50%; border: none; font-size: 20px; font-weight: bold; background: white; color: black; cursor: pointer; }
.timer { margin-top: 15px; font-size: 28px; font-variant-numeric: tabular-nums; }
.list { width: 80%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; max-height: 70vh; overflow-y: auto; }
.item { padding: 15px; border-radius: 10px; background: rgba(255,255,255,0.05); cursor: pointer; display: flex; justify-content: space-between; user-select: none; -webkit-user-select: none; }
#routeMap { width: 100%; height: 100%; display: none; }
#routeSummary { text-align: center; }
.info { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 400px; text-align: left; font-size: 13px; background: rgba(0,0,0,0.75); padding: 15px; border-radius: 8px; line-height: 1.6; display: none; z-index: 500; }

/* Handmatig donker scherm: een zwarte overlay boven alles */
#dimOverlay {
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 999;
  display: none;
}
body.dim #dimOverlay { display: block; }
</style>
</head>
<body>

<div id="dimOverlay"></div>

<div class="header">
  <div id="navBtn" class="btn">Routes</div>
  <div class="actions">
    <div id="dimBtn" class="btn" style="display:none;">Slaap</div>
    <div id="importBtn" class="btn" style="display:none;">Import</div>
    <div id="kaartBtn" class="btn" style="display:none;">Kaart</div>
    <div id="exportBtn" class="btn" style="display:none;">Export</div>
    <div id="deleteBtn" class="btn" style="display:none;">Verwijderen</div>
  </div>
</div>

<input type="file" id="importFile" accept="application/json,.json" style="display:none;">

<div id="run" class="screen active">
  <button class="bigbtn" id="btn" onclick="toggleRun();">START</button>
  <div class="timer" id="timer">00:00:00</div>
</div>

<div id="routes" class="screen">
  <div class="list" id="list"></div>
</div>

<div id="view" class="screen">
  <div id="routeSummary"><div id="summaryText"></div></div>
  <div id="routeMap"></div>
  <div class="info" id="info"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
let running = false, startTime, interval, tempRun, watchId;

/* ---------- GPS-verwerkingspipeline (real-time) ---------- */
const ACCURACY_MAX = 25;      // meter, verwerp minder nauwkeurige fixes
const SPEED_MAX = 6;          // m/s, verwerp onrealistische sprongen
const JITTER_MIN = 3;         // meter, negeer ruis dichter dan dit
const EMA_ALPHA = 0.3;        // gladstrijken van de route
const STOP_SPEED = 0.5;       // m/s, onder dit = "stilstaan"
const STOP_DURATION = 10000;  // ms, hoe lang stilstaan moet duren om als pauze te gelden

let lastRaw = null;         // laatste ruwe fix (voor snelheidsberekening), ongeacht of geaccepteerd
let lastRoutePoint = null;  // laatste punt dat echt aan de route is toegevoegd
let lowSpeedSince = null;   // tijdstip vanaf wanneer de snelheid laag is
let isPaused = false;       // zit de gebruiker in een pauze/stilstand

function processRawSample(raw){
  // 1. te onnauwkeurige fix negeren
  if(raw.accuracy != null && raw.accuracy > ACCURACY_MAX) return;

  // snelheid bepalen (uit device, of berekend uit afstand/tijd t.o.v. vorige ruwe fix)
  let instSpeed = 0;
  if(lastRaw){
    const dt = (raw.timestamp - lastRaw.timestamp) / 1000;
    const dist = getDistance(lastRaw, raw);
    instSpeed = dt > 0 ? dist / dt : 0;
  }
  if(typeof raw.speed === "number" && raw.speed >= 0){
    instSpeed = Math.max(instSpeed, raw.speed);
  }

  // 2. onrealistische sprong (GPS-spike) negeren
  if(lastRaw && instSpeed > SPEED_MAX){
    lastRaw = raw;
    return;
  }

  // 3. stop-detectie: aanhoudend lage snelheid = pauze, route niet laten afwijken
  if(instSpeed < STOP_SPEED){
    if(lowSpeedSince === null) lowSpeedSince = raw.timestamp;
    if(raw.timestamp - lowSpeedSince >= STOP_DURATION){
      isPaused = true;
    }
  } else {
    lowSpeedSince = null;
    isPaused = false;
  }

  lastRaw = raw;

  if(isPaused) return; // tijdens pauze geen nieuwe punten toevoegen: route blijft stabiel staan

  // 4. jitter verwijderen: te dichtbij het laatste routepunt = negeren
  if(lastRoutePoint && getDistance(lastRoutePoint, raw) < JITTER_MIN) return;

  // 5. smoothing met exponential moving average
  let lat, lon;
  if(!lastRoutePoint){
    lat = raw.lat; lon = raw.lon;
  } else {
    lat = EMA_ALPHA*raw.lat + (1-EMA_ALPHA)*lastRoutePoint.lat;
    lon = EMA_ALPHA*raw.lon + (1-EMA_ALPHA)*lastRoutePoint.lon;
  }

  const newPoint = { lat, lon, t: raw.timestamp - startTime };
  tempRun.points.push(newPoint);
  lastRoutePoint = newPoint;
}

/* ---------- Overig ---------- */
let selected = [];
let highlightedRange = [];
let currentRun = null;
let displayPoints = [];
let routeMap = null;
let routeLayerGroup = null;
let activeLineLayer = null;
let dotMarkers = [];
let mapVisible = false;

/* ---------- Helpers ---------- */
function pad(n){ return n.toString().padStart(2,'0'); }

function formatTime(ms){
  let totalSec = Math.max(0, Math.floor(ms/1000));
  let h = Math.floor(totalSec/3600);
  let m = Math.floor((totalSec%3600)/60);
  let s = totalSec%60;
  return pad(h)+':'+pad(m)+':'+pad(s);
}

function getDistance(p1, p2) {
  const R = 6371e3;
  const r1 = p1.lat * Math.PI/180, r2 = p2.lat * Math.PI/180;
  const dLat = (p2.lat-p1.lat)*Math.PI/180, dLon = (p2.lon-p1.lon)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(r1)*Math.cos(r2)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function centroid(points){
  let latSum = 0, lonSum = 0;
  points.forEach(p=>{ latSum += p.lat; lonSum += p.lon; });
  return { lat: latSum/points.length, lon: lonSum/points.length };
}

/* Extra vangnet voor oude/geimporteerde routes die niet door de nieuwe pipeline zijn gelopen */
function mergeClosePoints(points, thresholdMeters){
  if(!points.length) return points;
  const merged = [];
  let cluster = [points[0]];
  for(let i=1; i<points.length; i++){
    const c = centroid(cluster);
    if(getDistance(c, points[i]) <= thresholdMeters){
      cluster.push(points[i]);
    } else {
      const avg = centroid(cluster);
      merged.push({ lat: avg.lat, lon: avg.lon, t: cluster[0].t });
      cluster = [points[i]];
    }
  }
  const avg = centroid(cluster);
  merged.push({ lat: avg.lat, lon: avg.lon, t: cluster[0].t });
  return merged;
}

/* ---------- Navigatie ---------- */
function nav(screen){
  document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));
  document.getElementById(screen).classList.add("active");
  const navBtn = document.getElementById("navBtn");
  const dimBtn = document.getElementById("dimBtn");
  const importBtn = document.getElementById("importBtn");
  const kaartBtn = document.getElementById("kaartBtn");
  const exportBtn = document.getElementById("exportBtn");
  const deleteBtn = document.getElementById("deleteBtn");
  dimBtn.style.display = "none";
  importBtn.style.display = "none";
  kaartBtn.style.display = "none";
  exportBtn.style.display = "none";
  deleteBtn.style.display = "none";

  if(screen === "run"){
    navBtn.innerText = "Routes";
    navBtn.onclick = () => nav("routes");
    dimBtn.style.display = "block";
  } else if(screen === "routes"){
    navBtn.innerText = "Start";
    navBtn.onclick = () => nav("run");
    importBtn.style.display = "block";
    loadRuns();
  } else if(screen === "view"){
    navBtn.innerText = "Terug";
    navBtn.onclick = () => nav("routes");
    kaartBtn.style.display = "block";
    exportBtn.style.display = "block";
    deleteBtn.style.display = "block";
  }
}

/* ---------- Run tracken ---------- */
function startRun(){
  running = true;
  document.getElementById("btn").innerText = "STOP";
  startTime = Date.now();
  tempRun = { start: startTime, points: [] };
  lastRaw = null;
  lastRoutePoint = null;
  lowSpeedSince = null;
  isPaused = false;

  interval = setInterval(()=>{
    document.getElementById("timer").innerText = formatTime(Date.now()-startTime);
  }, 1000);

  watchId = navigator.geolocation.watchPosition(p=>{
    processRawSample({
      lat: p.coords.latitude,
      lon: p.coords.longitude,
      accuracy: p.coords.accuracy,
      speed: p.coords.speed,
      timestamp: p.timestamp || Date.now()
    });
  }, null, { enableHighAccuracy: true });
}

function toggleRun(){
  if(!running){
    startRun();
  } else {
    running = false;
    clearInterval(interval);
    navigator.geolocation.clearWatch(watchId);
    tempRun.end = Date.now();
    let runs = JSON.parse(localStorage.getItem("runs")||"[]");
    runs.unshift(tempRun);
    localStorage.setItem("runs", JSON.stringify(runs));
    document.getElementById("btn").innerText = "START";
    document.getElementById("timer").innerText = "00:00:00";
    nav("routes");
  }
}

/* Handmatig scherm donker maken; klik op het zwart schakelt weer uit */
document.getElementById("dimBtn").onclick = ()=>{
  document.body.classList.add("dim");
};
document.getElementById("dimOverlay").addEventListener("click", ()=>{
  document.body.classList.remove("dim");
});

/* ---------- Lijst met runs ---------- */
function loadRuns(){
  let runs = JSON.parse(localStorage.getItem("runs")||"[]");
  const list = document.getElementById("list");
  list.innerHTML = "";
  if(runs.length === 0){
    list.innerHTML = '<div style="opacity:0.5;text-align:center;">Nog geen runs</div>';
    return;
  }
  runs.forEach((r)=>{
    let totalDist = 0;
    for(let j=1; j<r.points.length; j++) totalDist += getDistance(r.points[j-1], r.points[j]);
    let durationMs = (r.end||Date.now()) - r.start;
    let d = new Date(r.start);
    let dateStr = pad(d.getDate())+'/'+pad(d.getMonth()+1)+' '+pad(d.getHours())+':'+pad(d.getMinutes());

    let div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `<span>${dateStr}</span><span>${(totalDist/1000).toFixed(2)} km · ${formatTime(durationMs)}</span>`;
    div.onclick = () => showRun(r);
    list.appendChild(div);
  });
}

/* ---------- Route importeren ---------- */
document.getElementById("importBtn").onclick = () => document.getElementById("importFile").click();
document.getElementById("importFile").addEventListener("change", (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    try{
      const run = JSON.parse(ev.target.result);
      if(!run.points || !Array.isArray(run.points) || run.points.length === 0){
        throw new Error("ongeldig");
      }
      if(!run.start) run.start = Date.now();
      let runs = JSON.parse(localStorage.getItem("runs")||"[]");
      runs.unshift(run);
      localStorage.setItem("runs", JSON.stringify(runs));
      loadRuns();
    } catch(err){
      alert("Kon dit bestand niet importeren, het is geen geldig RunFlow-bestand.");
    }
  };
  reader.readAsText(file);
  e.target.value = "";
});

/* ---------- Route weergeven ---------- */
function showRun(run){
  nav("view");
  currentRun = run;
  selected = [];
  highlightedRange = [];
  dotMarkers = [];
  mapVisible = false;
  document.getElementById("kaartBtn").classList.remove("on");
  document.getElementById("routeMap").style.display = "none";
  document.getElementById("routeSummary").style.display = "block";
  const info = document.getElementById("info");
  info.innerHTML = "";
  info.style.display = "none";

  displayPoints = mergeClosePoints(run.points, 8);

  let totalDist = 0;
  for(let j=1; j<run.points.length; j++) totalDist += getDistance(run.points[j-1], run.points[j]);
  const durationMs = (run.end||Date.now()) - run.start;
  const d = new Date(run.start);
  const dateStr = pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear()+' '+pad(d.getHours())+':'+pad(d.getMinutes());

  document.getElementById("summaryText").innerHTML = `
    <div style="font-size:15px; opacity:0.7; margin-bottom:6px;">${dateStr}</div>
    <div style="font-size:36px; font-weight:bold;">${(totalDist/1000).toFixed(2)} km</div>
    <div style="font-size:16px; opacity:0.8; margin-top:6px;">${formatTime(durationMs)}</div>
    <div style="font-size:13px; opacity:0.5; margin-top:24px;">Tik op "Kaart" om de route te bekijken</div>
  `;
}

/* Kaart tonen/verbergen */
document.getElementById("kaartBtn").onclick = ()=>{
  if(!currentRun) return;
  mapVisible = !mapVisible;
  document.getElementById("kaartBtn").classList.toggle("on", mapVisible);
  if(mapVisible){
    document.getElementById("routeSummary").style.display = "none";
    document.getElementById("routeMap").style.display = "block";
    renderMap();
  } else {
    document.getElementById("routeMap").style.display = "none";
    document.getElementById("routeSummary").style.display = "block";
  }
};

function renderMap(){
  if(!routeMap){
    routeMap = L.map("routeMap", { zoomControl: false, attributionControl: false });
    // Satellietbeelden (geen straatnamen/lijnen): je ziet groen, water en huizen
    L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
      maxZoom: 19
    }).addTo(routeMap);
    routeMap.on("click", onMapClick);
  }

  if(routeLayerGroup){ routeMap.removeLayer(routeLayerGroup); }
  if(activeLineLayer){ routeMap.removeLayer(activeLineLayer); activeLineLayer = null; }
  selected = [];
  highlightedRange = [];
  document.getElementById("info").style.display = "none";
  dotMarkers = [];

  const latlngs = displayPoints.map(p => [p.lat, p.lon]);
  const line = L.polyline(latlngs, { color: "#ffffff", weight: 2, opacity: 0.6 });

  const markers = displayPoints.map((p,i)=>{
    const m = L.circleMarker([p.lat, p.lon], { radius: 5, color: "#fff", weight: 1, fillColor: "#fff", fillOpacity: 0.9 });
    m.on("click", (e)=>{
      L.DomEvent.stopPropagation(e);
      selectPoint(p, i, m);
    });
    dotMarkers.push(m);
    return m;
  });

  routeLayerGroup = L.featureGroup([line, ...markers]).addTo(routeMap);

  setTimeout(()=>{
    routeMap.invalidateSize();
    routeMap.fitBounds(routeLayerGroup.getBounds(), { padding: [30,30] });
  }, 50);
}

/* Klik overal op de kaart -> pakt automatisch het dichtstbijzijnde punt */
function onMapClick(e){
  if(!displayPoints.length) return;
  let best = -1, bestDist = Infinity;
  displayPoints.forEach((p,i)=>{
    const d = getDistance(p, { lat: e.latlng.lat, lon: e.latlng.lng });
    if(d < bestDist){ bestDist = d; best = i; }
  });
  if(best >= 0) selectPoint(displayPoints[best], best, dotMarkers[best]);
}

function resetMarkerStyle(idx){
  dotMarkers[idx].setStyle({ color: "#fff", fillColor: "#fff" });
}

function selectPoint(p, i, el){
  if(selected.length === 2){
    selected.forEach(s => resetMarkerStyle(s.i));
    highlightedRange.forEach(idx => resetMarkerStyle(idx));
    highlightedRange = [];
    selected = [];
  }
  selected.push({ p, i, el });
  el.setStyle({ color: "#4ade80", fillColor: "#4ade80" });
  updateInfo();
}

function updateInfo(){
  const info = document.getElementById("info");
  if(activeLineLayer){ routeMap.removeLayer(activeLineLayer); activeLineLayer = null; }

  if(selected.length === 1){
    const { p } = selected[0];
    info.innerHTML = `Tijd: ${formatTime(p.t)}`;
    info.style.display = "block";
    return;
  }

  if(selected.length === 2){
    let [a,b] = selected;
    if(a.i > b.i) [a,b] = [b,a];
    const dist = getDistance(a.p, b.p);
    const dt = b.p.t - a.p.t;
    const seg = displayPoints.slice(a.i, b.i+1).map(p=>[p.lat, p.lon]);
    activeLineLayer = L.polyline(seg, { color: "#4ade80", weight: 4 }).addTo(routeMap);

    highlightedRange = [];
    for(let idx = a.i; idx <= b.i; idx++){
      dotMarkers[idx].setStyle({ color: "#4ade80", fillColor: "#4ade80" });
      highlightedRange.push(idx);
    }

    info.innerHTML = `Tijd: ${formatTime(a.p.t)} → ${formatTime(b.p.t)}<br>Afstand: ${dist.toFixed(0)} m<br>Duur: ${formatTime(dt)}`;
    info.style.display = "block";
  }
}

/* ---------- Verwijderen & exporteren ---------- */
document.getElementById("deleteBtn").onclick = ()=>{
  if(!currentRun) return;
  if(confirm("Deze route verwijderen?")){
    let runs = JSON.parse(localStorage.getItem("runs")||"[]");
    runs = runs.filter(r => r.start !== currentRun.start);
    localStorage.setItem("runs", JSON.stringify(runs));
    currentRun = null;
    nav("routes");
  }
};

document.getElementById("exportBtn").onclick = ()=>{
  if(!currentRun) return;
  const dataStr = JSON.stringify(currentRun, null, 2);
  const blob = new Blob([dataStr], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const d = new Date(currentRun.start);
  const a = document.createElement("a");
  a.href = url;
  a.download = `runflow-${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};

/* ---------- Testroute Amersfoort ---------- */
function seedTestRoute(){
  let runs = JSON.parse(localStorage.getItem("runs")||"[]");
  if(runs.length > 0) return;
  const centerLat = 52.1561, centerLon = 5.3878; // centrum Amersfoort
  const n = 40;
  const points = [];
  for(let i=0; i<=n; i++){
    const angle = (i/n) * Math.PI * 2;
    const r = 0.009; // ongeveer 1 km straal
    const lat = centerLat + r*Math.sin(angle);
    const lon = centerLon + (r*Math.cos(angle)) / Math.cos(centerLat*Math.PI/180);
    points.push({ lat, lon, t: i * 30000 }); // elke 30s een punt
  }
  const startTs = Date.now() - (24*60*60*1000);
  const testRun = { start: startTs, end: startTs + n*30000, points };
  runs.unshift(testRun);
  localStorage.setItem("runs", JSON.stringify(runs));
}

/* ---------- Init ---------- */
seedTestRoute();
nav("run");
</script>
</body>
</html>
